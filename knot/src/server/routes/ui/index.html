<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knot — Explorer</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/ui/style.css" />
  </head>
  <body>
    <header>
      <div class="header-brand">
        <svg class="knot-icon" viewBox="0 0 24 24" width="22" height="22">
          <circle
            cx="12"
            cy="12"
            r="3"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          />
          <path
            d="M12 2v7M12 15v7M2 12h7M15 12h7"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
          />
          <circle cx="12" cy="2" r="1.5" fill="currentColor" />
          <circle cx="12" cy="22" r="1.5" fill="currentColor" />
          <circle cx="2" cy="12" r="1.5" fill="currentColor" />
          <circle cx="22" cy="12" r="1.5" fill="currentColor" />
        </svg>
        <h1>Knot</h1>
      </div>
      <nav class="header-nav">
        <a href="/docs" class="header-link">API Docs</a>
        <a href="/api/openapi.yaml" class="header-link">OpenAPI</a>
      </nav>
    </header>

    <aside id="sidebar">
      <div class="sidebar-section">
        <div class="section-header">
          <span class="section-label">Namespace</span>
        </div>
        <div class="ns-row">
          <select id="ns-select">
            <option value="">choose...</option>
          </select>
          <button
            class="icon-btn"
            onclick="createNamespace()"
            title="New namespace"
          >
            <svg viewBox="0 0 16 16" width="14" height="14">
              <path
                d="M8 2v12M2 8h12"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
          </button>
          <button
            class="icon-btn danger"
            onclick="dropNamespace()"
            title="Drop namespace"
          >
            <svg viewBox="0 0 16 16" width="14" height="14">
              <path
                d="M4 4l8 8M12 4l-8 8"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </div>
      </div>

      <div class="sidebar-section" id="tables-nav" style="display: none">
        <div class="section-header">
          <span class="section-label">Tables</span>
          <button class="icon-btn" onclick="createTable()" title="New table">
            <svg viewBox="0 0 16 16" width="12" height="12">
              <path
                d="M8 2v12M2 8h12"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </div>
        <ul id="tables-list" class="item-list"></ul>
      </div>

      <div class="sidebar-section" id="links-nav" style="display: none">
        <div class="section-header">
          <span class="section-label">Link Tables</span>
          <button
            class="icon-btn"
            onclick="createLink()"
            title="New link table"
          >
            <svg viewBox="0 0 16 16" width="12" height="12">
              <path
                d="M8 2v12M2 8h12"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </div>
        <ul id="links-list" class="item-list"></ul>
      </div>

      <div class="sidebar-footer">
        <span class="version-tag">v0.1.0</span>
      </div>
    </aside>

    <main id="main">
      <div id="welcome">
        <div class="welcome-content">
          <svg class="welcome-icon" viewBox="0 0 64 64" width="64" height="64">
            <circle
              cx="20"
              cy="20"
              r="6"
              fill="none"
              stroke="var(--accent)"
              stroke-width="2"
            />
            <circle
              cx="44"
              cy="20"
              r="6"
              fill="none"
              stroke="var(--accent)"
              stroke-width="2"
            />
            <circle
              cx="32"
              cy="44"
              r="6"
              fill="none"
              stroke="var(--accent)"
              stroke-width="2"
            />
            <line
              x1="25"
              y1="23"
              x2="28"
              y2="39"
              stroke="var(--accent-dim)"
              stroke-width="1.5"
            />
            <line
              x1="39"
              y1="23"
              x2="36"
              y2="39"
              stroke="var(--accent-dim)"
              stroke-width="1.5"
            />
            <line
              x1="26"
              y1="18"
              x2="38"
              y2="18"
              stroke="var(--accent-dim)"
              stroke-width="1.5"
            />
          </svg>
          <h2>Welcome to Knot</h2>
          <p>Select or create a namespace to start exploring your graph.</p>
        </div>
      </div>

      <div id="content" style="display: none">
        <div id="toolbar">
          <div class="tab-bar">
            <button
              class="tab active"
              data-view="nodes"
              onclick="switchView('nodes')"
            >
              Nodes
            </button>
            <button class="tab" data-view="links" onclick="switchView('links')">
              Links
            </button>
            <button
              class="tab"
              data-view="traverse"
              onclick="switchView('traverse')"
            >
              Traverse
            </button>
          </div>
          <div class="toolbar-actions">
            <button class="action-btn" onclick="addNode()" title="Insert node">
              + Node
            </button>
            <button class="action-btn" onclick="addLink()" title="Insert link">
              + Link
            </button>
            <button
              class="action-btn ghost"
              onclick="refresh()"
              title="Refresh"
            >
              ↻
            </button>
          </div>
        </div>
        <div id="results"></div>
      </div>
    </main>

    <!-- Modal overlay -->
    <div id="modal-overlay" class="modal-overlay" style="display: none">
      <div id="modal-box" class="modal-box"></div>
    </div>

    <!-- Toast notifications -->
    <div id="toast-container" class="toast-container"></div>

    <script src="/ui/app.js"></script>
  </body>
</html>
