[package]
name = "rkv"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "rkv"
path = "src/main.rs"

[[bin]]
name = "bench"
path = "src/bin/bench.rs"

[lib]
name = "rkv"
path = "src/lib.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
dirs-sys = "0.5"
fast32 = "1.0.3"
fastrand = "2"
rpassword = "5"
sysinfo = "0.34"
rustyline = "17"
tempfile = "3"
thiserror = "2"
