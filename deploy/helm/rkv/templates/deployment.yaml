apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rkv.fullname" . }}
  labels:
    {{- include "rkv.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "rkv.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rkv.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "rkv.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      terminationGracePeriodSeconds: 30
      containers:
        - name: rkv
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - serve
          env:
            - name: RKV_SERVER_BIND
              value: {{ .Values.server.bind | quote }}
            - name: RKV_SERVER_PORT
              value: {{ .Values.server.port | quote }}
            - name: RKV_SERVER_BODY_LIMIT
              value: {{ .Values.server.bodyLimit | quote }}
            - name: RKV_SERVER_TIMEOUT
              value: {{ .Values.server.timeout | quote }}
            {{- if .Values.server.allowAll }}
            - name: RKV_SERVER_ALLOW_ALL
              value: "true"
            {{- end }}
            {{- if .Values.server.ui }}
            - name: RKV_SERVER_UI
              value: "true"
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /data
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "rkv.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
