image:
  repository: rkv
  tag: latest
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""
  annotations: {}

service:
  type: ClusterIP
  port: 8321

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: rkv.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 1Gi

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

# rKV server settings (injected as RKV_* environment variables)
server:
  bind: "0.0.0.0"
  port: 8321
  allowAll: true
  bodyLimit: "2mb"
  timeout: 30
  ui: false

# Additional RKV_* env vars for storage, replication, cluster tuning.
# See docs/config.md for the full reference.
# Example:
#   extraEnv:
#     - name: RKV_STORAGE_CACHE_SIZE
#       value: "64mb"
#     - name: RKV_REPLICATION_ROLE
#       value: primary
extraEnv: []
