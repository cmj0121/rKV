name: Benchmark

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: bench-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run benchmarks
        run: cargo run --bin bench --release

      - name: Run comparison benchmarks
        run: cargo run --bin bench_compare --features bench-compare --release

      - name: Format BENCH.md
        run: npx prettier@3 --write BENCH.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add BENCH.md
          git diff --staged --quiet || \
            (git commit -m "docs(bench): [skip ci] update benchmark results" && \
             git push)
