services:
  # --- Write nodes (peer mode, accept reads and writes) ---
  primary:
    build: .
    platform: linux/amd64
    ports:
      - "8321:8321"
    volumes:
      - .data/primary:/data
    command:
      [
        "serve",
        "--bind",
        "0.0.0.0",
        "--db",
        "/data",
        "--allow-all",
        "--ui",
        "--role",
        "peer",
        "--repl-port",
        "8322",
        "--cluster-id",
        "1",
        "--peers",
        "peer:8322",
      ]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8321/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  peer:
    build: .
    platform: linux/amd64
    ports:
      - "8323:8321"
    volumes:
      - .data/peer:/data
    command:
      [
        "serve",
        "--bind",
        "0.0.0.0",
        "--db",
        "/data",
        "--allow-all",
        "--ui",
        "--role",
        "peer",
        "--repl-port",
        "8322",
        "--cluster-id",
        "2",
        "--peers",
        "primary:8322",
      ]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8321/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # --- Read nodes (peer mode, designated for read traffic) ---
  replica-01:
    build: .
    platform: linux/amd64
    ports:
      - "8324:8321"
    volumes:
      - .data/replica-01:/data
    command:
      [
        "serve",
        "--bind",
        "0.0.0.0",
        "--db",
        "/data",
        "--allow-all",
        "--ui",
        "--role",
        "peer",
        "--repl-port",
        "8322",
        "--cluster-id",
        "3",
        "--peers",
        "primary:8322",
        "--peers",
        "peer:8322",
      ]
    depends_on:
      primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8321/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  replica-02:
    build: .
    platform: linux/amd64
    ports:
      - "8325:8321"
    command:
      [
        "serve",
        "--bind",
        "0.0.0.0",
        "--db",
        "/data",
        "--allow-all",
        "--ui",
        "--role",
        "peer",
        "--repl-port",
        "8322",
        "--cluster-id",
        "4",
        "--peers",
        "primary:8322",
        "--peers",
        "peer:8322",
      ]
    depends_on:
      primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8321/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  replica-03:
    build: .
    platform: linux/amd64
    ports:
      - "8326:8321"
    command:
      [
        "serve",
        "--bind",
        "0.0.0.0",
        "--db",
        "/data",
        "--allow-all",
        "--ui",
        "--role",
        "peer",
        "--repl-port",
        "8322",
        "--cluster-id",
        "5",
        "--peers",
        "primary:8322",
        "--peers",
        "peer:8322",
      ]
    depends_on:
      peer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8321/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # --- Cluster mode (docker compose --profile cluster up) ---
  gateway:
    profiles: ["cluster"]
    build: .
    platform: linux/amd64
    ports:
      - "8320:8321"
    command:
      [
        "serve",
        "--bind",
        "0.0.0.0",
        "--allow-all",
        "--ui",
        "--cluster-config",
        "/etc/rkv/cluster.toml",
      ]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8321/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  shard1-a:
    profiles: ["cluster"]
    build: .
    platform: linux/amd64
    ports:
      - "8331:8321"
    volumes:
      - .data/shard1-a:/data
    command:
      [
        "serve",
        "--bind",
        "0.0.0.0",
        "--db",
        "/data",
        "--allow-all",
        "--role",
        "peer",
        "--repl-port",
        "8322",
        "--cluster-id",
        "10",
        "--peers",
        "shard1-b:8322",
        "--shard-group",
        "1",
        "--owned-namespaces",
        "users,sessions",
      ]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8321/health"]
