# Default mode (docker compose up):
#
#   Client
#     |
#     v
#   primary :8321 (R+W)
#     |  replication
#     +--------+--------+
#     |                  |
#     v                  v
#   replica-01 :8324   replica-02 :8325
#   (read-only)        (read-only)
#
# Cluster mode (docker compose --profile cluster up):
#
#   Client
#     |
#     +----------+-----------+----------+
#     |          |           |          |
#     v          v           v          v
#   primary    shard1-a    shard2-a    ...
#   :8321      :8331       :8333
#   (default)  (users,     (orders,
#              sessions)   products)
#              peer:       peer:
#              shard1-b    shard2-b
#              :8332       :8334
#
#   Request flow:
#     1. Client sends request to any node
#     2. Node checks --owned-namespaces
#     3. If owned  -> process request, return response
#     4. If not    -> return 307 MOVED + X-RKV-Shard header
#     5. Client retries on the correct shard node

x-common: &common
  build: .
  platform: linux/amd64
  healthcheck:
    test: ["CMD", "wget", "-qO-", "http://localhost:8321/health"]
    interval: 10s
    timeout: 3s
    retries: 3
    start_period: 5s

services:
  # --- Default mode (docker compose up): 1 primary + 2 replicas ---
  primary:
    <<: *common
    ports:
      - "8321:8321"
    volumes:
      - .data/primary:/data
    environment:
      RKV_SERVER_UI: "true"
      RKV_REPLICATION_ROLE: primary
      RKV_REPLICATION_REPL_PORT: "8322"
      RKV_REPLICATION_CLUSTER_ID: "1"

  replica-01:
    <<: *common
    ports:
      - "8324:8321"
    volumes:
      - .data/replica-01:/data
    environment:
      RKV_SERVER_UI: "true"
      RKV_REPLICATION_ROLE: replica
      RKV_REPLICATION_CLUSTER_ID: "2"
      RKV_REPLICATION_PRIMARY_ADDR: primary:8322
    depends_on:
      primary:
        condition: service_healthy

  replica-02:
    <<: *common
    ports:
      - "8325:8321"
    volumes:
      - .data/replica-02:/data
    environment:
      RKV_SERVER_UI: "true"
      RKV_REPLICATION_ROLE: replica
      RKV_REPLICATION_CLUSTER_ID: "3"
      RKV_REPLICATION_PRIMARY_ADDR: primary:8322
    depends_on:
      primary:
        condition: service_healthy

  # --- Rill message queue (launches by default alongside primary) ---
  rill:
    build:
      context: .
      dockerfile: rill/Dockerfile
    platform: linux/amd64
    ports:
      - "3000:3000"
    environment:
      RILL_RKV_MODE: "remote"
      RILL_RKV_URL: "http://primary:8321"
      RILL_ADMIN_TOKEN: "admin-secret"
      RILL_WRITER_TOKEN: "writer-secret"
      RILL_READER_TOKEN: "reader-secret"
      RILL_UI: "true"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    depends_on:
      primary:
        condition: service_healthy

  # --- Cluster mode (docker compose --profile cluster up) ---
  # Adds 2 shard groups alongside the primary/replicas.
  # Primary serves as the default shard (all unassigned namespaces).
  # Shard groups own specific namespaces and reject others with 307 MOVED.
  shard1-a:
    <<: *common
    profiles: ["cluster"]
    ports:
      - "8331:8321"
    volumes:
      - .data/shard1-a:/data
    environment:
      RKV_SERVER_UI: "true"
      RKV_REPLICATION_ROLE: peer
      RKV_REPLICATION_REPL_PORT: "8322"
      RKV_REPLICATION_CLUSTER_ID: "10"
      RKV_REPLICATION_PEERS: shard1-b:8322
      RKV_CLUSTER_SHARD_GROUP: "1"
      RKV_CLUSTER_OWNED_NAMESPACES: users,sessions
    depends_on:
      primary:
        condition: service_healthy

  shard1-b:
    <<: *common
    profiles: ["cluster"]
    ports:
      - "8332:8321"
    volumes:
      - .data/shard1-b:/data
    environment:
      RKV_SERVER_UI: "true"
      RKV_REPLICATION_ROLE: peer
      RKV_REPLICATION_REPL_PORT: "8322"
      RKV_REPLICATION_CLUSTER_ID: "11"
      RKV_REPLICATION_PEERS: shard1-a:8322
      RKV_CLUSTER_SHARD_GROUP: "1"
      RKV_CLUSTER_OWNED_NAMESPACES: users,sessions
    depends_on:
      primary:
        condition: service_healthy

  shard2-a:
    <<: *common
    profiles: ["cluster"]
    ports:
      - "8333:8321"
    volumes:
      - .data/shard2-a:/data
    environment:
      RKV_SERVER_UI: "true"
      RKV_REPLICATION_ROLE: peer
      RKV_REPLICATION_REPL_PORT: "8322"
      RKV_REPLICATION_CLUSTER_ID: "20"
      RKV_REPLICATION_PEERS: shard2-b:8322
      RKV_CLUSTER_SHARD_GROUP: "2"
      RKV_CLUSTER_OWNED_NAMESPACES: orders,products
    depends_on:
      primary:
        condition: service_healthy

  shard2-b:
    <<: *common
    profiles: ["cluster"]
    ports:
      - "8334:8321"
    volumes:
      - .data/shard2-b:/data
    environment:
      RKV_SERVER_UI: "true"
      RKV_REPLICATION_ROLE: peer
      RKV_REPLICATION_REPL_PORT: "8322"
      RKV_REPLICATION_CLUSTER_ID: "21"
      RKV_REPLICATION_PEERS: shard2-a:8322
      RKV_CLUSTER_SHARD_GROUP: "2"
      RKV_CLUSTER_OWNED_NAMESPACES: orders,products
    depends_on:
      primary:
        condition: service_healthy
