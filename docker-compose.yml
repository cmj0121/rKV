services:
  # --- Write nodes (peer mode, accept reads and writes) ---
  write-1:
    build: .
    platform: linux/amd64
    ports:
      - "8321:8321"
    volumes:
      - .data/write-1:/data
    command:
      [
        "serve",
        "--bind",
        "0.0.0.0",
        "--db",
        "/data",
        "--allow-all",
        "--ui",
        "--role",
        "peer",
        "--repl-port",
        "8322",
        "--cluster-id",
        "1",
        "--peers",
        "write-2:8322",
      ]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8321/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  write-2:
    build: .
    platform: linux/amd64
    ports:
      - "8323:8321"
    volumes:
      - .data/write-2:/data
    command:
      [
        "serve",
        "--bind",
        "0.0.0.0",
        "--db",
        "/data",
        "--allow-all",
        "--ui",
        "--role",
        "peer",
        "--repl-port",
        "8322",
        "--cluster-id",
        "2",
        "--peers",
        "write-1:8322",
      ]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8321/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # --- Read nodes (peer mode, designated for read traffic) ---
  read-1:
    build: .
    platform: linux/amd64
    ports:
      - "8324:8321"
    volumes:
      - .data/read-1:/data
    command:
      [
        "serve",
        "--bind",
        "0.0.0.0",
        "--db",
        "/data",
        "--allow-all",
        "--ui",
        "--role",
        "peer",
        "--repl-port",
        "8322",
        "--cluster-id",
        "3",
        "--peers",
        "write-1:8322,write-2:8322",
      ]
    depends_on:
      write-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8321/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  read-2:
    build: .
    platform: linux/amd64
    ports:
      - "8325:8321"
    volumes:
      - .data/read-2:/data
    command:
      [
        "serve",
        "--bind",
        "0.0.0.0",
        "--db",
        "/data",
        "--allow-all",
        "--ui",
        "--role",
        "peer",
        "--repl-port",
        "8322",
        "--cluster-id",
        "4",
        "--peers",
        "write-1:8322,write-2:8322",
      ]
    depends_on:
      write-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8321/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  read-3:
    build: .
    platform: linux/amd64
    ports:
      - "8326:8321"
    volumes:
      - .data/read-3:/data
    command:
      [
        "serve",
        "--bind",
        "0.0.0.0",
        "--db",
        "/data",
        "--allow-all",
        "--ui",
        "--role",
        "peer",
        "--repl-port",
        "8322",
        "--cluster-id",
        "5",
        "--peers",
        "write-1:8322,write-2:8322",
      ]
    depends_on:
      write-2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8321/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
